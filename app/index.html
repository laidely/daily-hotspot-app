<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#6c5ce7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="AI热点每日速递 - 面向科技从业者的AI新闻聚合与深度分析工具">
<link rel="manifest" href="manifest.json">
<title>AI热点每日速递</title>
<style>
/* ========== CSS Variables / Themes ========== */
:root {
  /* Dark theme (default) */
  --bg-primary: #0a0a0f;
  --bg-secondary: #13131a;
  --bg-card: #1a1a24;
  --bg-card-hover: #22222e;
  --bg-elevated: #252532;
  --bg-input: #1e1e2a;
  --bg-modal: #16161f;
  --bg-overlay: rgba(0,0,0,0.7);
  --text-primary: #f0f0f5;
  --text-secondary: #a0a0b8;
  --text-tertiary: #6a6a82;
  --accent-primary: #6c5ce7;
  --accent-secondary: #a29bfe;
  --accent-gradient: linear-gradient(135deg, #6c5ce7, #a29bfe);
  --accent-gradient-warm: linear-gradient(135deg, #fd79a8, #e17055);
  --accent-gradient-cool: linear-gradient(135deg, #00b894, #00cec9);
  --accent-gradient-blue: linear-gradient(135deg, #0984e3, #74b9ff);
  --accent-gradient-orange: linear-gradient(135deg, #e17055, #fdcb6e);
  --accent-gradient-purple: linear-gradient(135deg, #6c5ce7, #fd79a8);
  --border-color: rgba(255,255,255,0.06);
  --border-color-strong: rgba(255,255,255,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px rgba(108,92,231,0.3);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --tag-ai: #6c5ce7;
  --tag-office: #00b894;
  --tag-efficiency: #fdcb6e;
  --tag-dev: #0984e3;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s cubic-bezier(0.4,0,0.2,1);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="light"] {
  --bg-primary: #f5f5fa;
  --bg-secondary: #eeeef5;
  --bg-card: #ffffff;
  --bg-card-hover: #f8f8ff;
  --bg-elevated: #f0f0f8;
  --bg-input: #f0f0f8;
  --bg-modal: #ffffff;
  --bg-overlay: rgba(0,0,0,0.5);
  --text-primary: #1a1a2e;
  --text-secondary: #5a5a72;
  --text-tertiary: #8a8a9a;
  --border-color: rgba(0,0,0,0.06);
  --border-color-strong: rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
  --shadow-glow: 0 0 20px rgba(108,92,231,0.15);
}

/* ========== Reset & Base ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
  padding-bottom:calc(70px + var(--safe-bottom));
  transition:background var(--transition-normal),color var(--transition-normal);
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{border:none;background:none;cursor:pointer;font-family:inherit;color:inherit}
input,textarea{font-family:inherit}
ul{list-style:none}

/* ========== App Shell ========== */
.app-header{
  position:sticky;top:0;z-index:100;
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border-color);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:calc(var(--safe-top) + 8px) 16px 8px;
  transition:background var(--transition-normal);
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.header-brand{
  display:flex;align-items:center;gap:8px;
}
.brand-icon{
  width:32px;height:32px;
  background:var(--accent-gradient);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  box-shadow:var(--shadow-glow);
}
.brand-title{
  font-size:18px;font-weight:700;
  background:var(--accent-gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand-date{
  font-size:11px;color:var(--text-tertiary);font-weight:400;
  margin-top:-2px;
}
.header-actions{display:flex;gap:6px}
.icon-btn{
  width:36px;height:36px;
  border-radius:var(--radius-full);
  background:var(--bg-card);
  border:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition-fast);
  font-size:16px;
}
.icon-btn:active{transform:scale(0.92);background:var(--bg-elevated)}
.icon-btn svg{width:18px;height:18px;fill:var(--text-secondary)}

/* Search bar */
.search-bar{
  position:relative;
  margin-bottom:10px;
}
.search-bar input{
  width:100%;
  height:40px;
  padding:0 16px 0 40px;
  background:var(--bg-input);
  border:1px solid var(--border-color);
  border-radius:var(--radius-full);
  color:var(--text-primary);
  font-size:14px;
  outline:none;
  transition:all var(--transition-fast);
}
.search-bar input::placeholder{color:var(--text-tertiary)}
.search-bar input:focus{
  border-color:var(--accent-primary);
  box-shadow:0 0 0 3px rgba(108,92,231,0.15);
}
.search-bar .search-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;fill:var(--text-tertiary);
}
.search-bar .search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;
  border-radius:var(--radius-full);
  background:var(--bg-elevated);
  display:none;align-items:center;justify-content:center;
  font-size:12px;color:var(--text-tertiary);
}
.search-bar .search-clear.visible{display:flex}

/* Category tabs */
.category-tabs{
  display:flex;gap:8px;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.category-tabs::-webkit-scrollbar{display:none}
.category-tab{
  flex-shrink:0;
  padding:6px 16px;
  border-radius:var(--radius-full);
  font-size:13px;font-weight:500;
  color:var(--text-secondary);
  background:var(--bg-card);
  border:1px solid var(--border-color);
  transition:all var(--transition-fast);
  white-space:nowrap;
}
.category-tab:active{transform:scale(0.95)}
.category-tab.active{
  color:#fff;
  background:var(--accent-gradient);
  border-color:transparent;
  box-shadow:var(--shadow-glow);
}

/* ========== Content ========== */
.app-content{
  padding:12px 16px;
  max-width:480px;
  margin:0 auto;
}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin:20px 0 12px;
}
.section-title{
  font-size:16px;font-weight:700;
  display:flex;align-items:center;gap:6px;
}
.section-title .dot{
  width:6px;height:6px;
  border-radius:var(--radius-full);
  background:var(--accent-primary);
  box-shadow:0 0 8px var(--accent-primary);
}
.section-action{
  font-size:12px;color:var(--accent-secondary);font-weight:500;
}

/* ========== News Card ========== */
.news-card{
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  border:1px solid var(--border-color);
  overflow:hidden;
  margin-bottom:14px;
  transition:all var(--transition-normal);
  animation:cardFadeIn 0.4s ease forwards;
  opacity:0;
  transform:translateY(12px);
}
.news-card:active{transform:scale(0.985)}
.news-card.hidden{display:none}
@keyframes cardFadeIn{
  to{opacity:1;transform:translateY(0)}
}

.card-gradient-bar{
  height:3px;
  background:var(--accent-gradient);
}
.card-gradient-bar.cat-office{background:var(--accent-gradient-cool)}
.card-gradient-bar.cat-efficiency{background:var(--accent-gradient-orange)}
.card-gradient-bar.cat-dev{background:var(--accent-gradient-blue)}

.card-body{padding:14px 16px}
.card-meta{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.card-tag{
  font-size:10px;font-weight:600;
  padding:2px 8px;
  border-radius:var(--radius-full);
  color:#fff;
}
.card-tag.tag-ai{background:var(--tag-ai)}
.card-tag.tag-office{background:var(--tag-office)}
.card-tag.tag-efficiency{background:var(--tag-efficiency);color:#333}
.card-tag.tag-dev{background:var(--tag-dev)}
.card-source{font-size:11px;color:var(--text-tertiary)}
.card-time{font-size:11px;color:var(--text-tertiary);margin-left:auto}

.card-title{
  font-size:15px;font-weight:700;line-height:1.45;
  margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-summary{
  font-size:13px;color:var(--text-secondary);line-height:1.55;
  margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

.card-image-wrapper{
  position:relative;
  margin:0 -16px;
  height:0;
  overflow:hidden;
  border-radius:var(--radius-md);
  transition:height var(--transition-slow);
}
.card-image-wrapper img{
  width:100%;height:180px;
  object-fit:cover;
  opacity:0.9;
}
.card-image-placeholder{
  width:100%;height:180px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  background:var(--bg-elevated);
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--border-color);
}
.card-stats{
  display:flex;gap:14px;
}
.card-stat{
  font-size:11px;color:var(--text-tertiary);
  display:flex;align-items:center;gap:3px;
}
.card-stat svg{width:13px;height:13px;fill:var(--text-tertiary)}
.card-bookmark{
  width:32px;height:32px;
  border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition-fast);
}
.card-bookmark svg{width:18px;height:18px;fill:var(--text-tertiary);transition:all var(--transition-fast)}
.card-bookmark.bookmarked svg{fill:var(--accent-primary)}
.card-bookmark:active{transform:scale(0.85)}

/* ========== Hot badge ========== */
.hot-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;
  color:#fd79a8;
}
.hot-badge::before{
  content:'';display:block;
  width:6px;height:6px;
  border-radius:var(--radius-full);
  background:#fd79a8;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(1.3)}
}

/* ========== Detail Page (slide-up panel) ========== */
.detail-overlay{
  position:fixed;inset:0;z-index:200;
  background:var(--bg-overlay);
  opacity:0;pointer-events:none;
  transition:opacity var(--transition-normal);
}
.detail-overlay.active{opacity:1;pointer-events:auto}

.detail-panel{
  position:fixed;left:0;right:0;bottom:0;z-index:210;
  max-height:92vh;
  background:var(--bg-modal);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  transform:translateY(100%);
  transition:transform var(--transition-slow);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.detail-panel.active{transform:translateY(0)}
.detail-panel .panel-handle{
  width:36px;height:4px;
  background:var(--border-color-strong);
  border-radius:var(--radius-full);
  margin:10px auto 0;
  flex-shrink:0;
}
.detail-scroll{
  overflow-y:auto;
  flex:1;
  overscroll-behavior:contain;
  padding:12px 20px calc(24px + var(--safe-bottom));
}
.detail-scroll::-webkit-scrollbar{width:0}

.detail-tag-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
}
.detail-title{
  font-size:20px;font-weight:800;line-height:1.4;
  margin-bottom:12px;
}
.detail-meta-row{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  font-size:12px;color:var(--text-tertiary);
  margin-bottom:16px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border-color);
}
.detail-image{
  width:100%;height:200px;
  border-radius:var(--radius-md);
  overflow:hidden;margin-bottom:16px;
  background:var(--bg-elevated);
  display:flex;align-items:center;justify-content:center;
  font-size:60px;
}
.detail-content{
  font-size:14px;line-height:1.75;
  color:var(--text-secondary);
  margin-bottom:20px;
}
.detail-content p{margin-bottom:12px}
.detail-analysis{
  background:var(--bg-elevated);
  border-radius:var(--radius-md);
  padding:16px;
  margin-bottom:20px;
  border-left:3px solid var(--accent-primary);
}
.detail-analysis h3{
  font-size:14px;font-weight:700;color:var(--accent-secondary);
  margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.detail-analysis p{
  font-size:13px;line-height:1.7;color:var(--text-secondary);
}

/* Detail actions */
.detail-actions{
  display:flex;gap:10px;
  margin-bottom:20px;
}
.detail-action-btn{
  flex:1;height:42px;
  border-radius:var(--radius-full);
  font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all var(--transition-fast);
  border:1px solid var(--border-color);
  background:var(--bg-card);
}
.detail-action-btn:active{transform:scale(0.96)}
.detail-action-btn.primary{
  background:var(--accent-gradient);color:#fff;border-color:transparent;
  box-shadow:var(--shadow-glow);
}
.detail-action-btn svg{width:16px;height:16px}

/* Related news */
.related-section{margin-top:8px}
.related-card{
  display:flex;gap:12px;
  padding:12px;
  background:var(--bg-card);
  border-radius:var(--radius-md);
  border:1px solid var(--border-color);
  margin-bottom:10px;
  transition:all var(--transition-fast);
}
.related-card:active{background:var(--bg-card-hover)}
.related-thumb{
  width:72px;height:54px;
  border-radius:var(--radius-sm);
  background:var(--bg-elevated);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;overflow:hidden;
}
.related-info{flex:1;min-width:0}
.related-title{
  font-size:13px;font-weight:600;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:4px;
}
.related-meta{font-size:11px;color:var(--text-tertiary)}

/* ========== Bottom Nav ========== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg-secondary);
  border-top:1px solid var(--border-color);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding-bottom:var(--safe-bottom);
  transition:background var(--transition-normal);
}
.nav-items{
  display:flex;
  max-width:480px;
  margin:0 auto;
}
.nav-item{
  flex:1;
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 6px;
  gap:3px;
  transition:all var(--transition-fast);
}
.nav-item svg{
  width:22px;height:22px;fill:var(--text-tertiary);
  transition:all var(--transition-fast);
}
.nav-item span{font-size:10px;color:var(--text-tertiary);font-weight:500;transition:color var(--transition-fast)}
.nav-item.active svg{fill:var(--accent-primary)}
.nav-item.active span{color:var(--accent-primary)}
.nav-item:active{opacity:0.7}

/* ========== Favorites Page ========== */
.page{display:none}
.page.active{display:block}
.page-header-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;
  margin-bottom:8px;
}
.page-header-bar h2{font-size:20px;font-weight:700}
.page-header-bar .back-btn{
  width:36px;height:36px;
  border-radius:var(--radius-full);
  background:var(--bg-card);
  border:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:center;
}
.page-header-bar .back-btn svg{width:18px;height:18px;fill:var(--text-secondary)}

/* Tags management */
.tags-section{padding:16px}
.tags-section h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text-secondary)}
.tags-cloud{display:flex;flex-wrap:wrap;gap:8px}
.user-tag{
  padding:6px 14px;
  border-radius:var(--radius-full);
  font-size:12px;font-weight:500;
  background:var(--bg-card);
  border:1px solid var(--border-color-strong);
  color:var(--text-secondary);
  transition:all var(--transition-fast);
  display:flex;align-items:center;gap:4px;
}
.user-tag .remove-tag{
  width:16px;height:16px;
  border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;
  color:var(--text-tertiary);
}
.user-tag:active{transform:scale(0.93)}

.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--text-tertiary);
}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:0.5}
.empty-state p{font-size:14px;line-height:1.6}

/* ========== Loading shimmer ========== */
.shimmer{
  background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-elevated) 50%,var(--bg-card) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ========== Scroll to top ========== */
.scroll-top-btn{
  position:fixed;bottom:calc(80px + var(--safe-bottom));right:20px;z-index:90;
  width:42px;height:42px;
  border-radius:var(--radius-full);
  background:var(--accent-gradient);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-glow),var(--shadow-md);
  opacity:0;transform:scale(0.5);
  transition:all var(--transition-normal);
  pointer-events:none;
}
.scroll-top-btn.visible{opacity:1;transform:scale(1);pointer-events:auto}
.scroll-top-btn:active{transform:scale(0.85)}
.scroll-top-btn svg{width:20px;height:20px;fill:#fff}

/* ========== Lazy load fade ========== */
.lazy-img{
  opacity:0;transition:opacity 0.4s ease;
}
.lazy-img.loaded{opacity:1}

/* ========== Custom tag colors ========== */
.tag-color-0{background:#6c5ce7}
.tag-color-1{background:#00b894}
.tag-color-2{background:#e17055}
.tag-color-3{background:#0984e3}
.tag-color-4{background:#fd79a8}
.tag-color-5{background:#fdcb6e;color:#333}

/* ========== Trending section ========== */
.trending-card{
  background:var(--bg-card);
  border-radius:var(--radius-md);
  border:1px solid var(--border-color);
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
  transition:all var(--transition-fast);
}
.trending-card:active{background:var(--bg-card-hover)}
.trending-rank{
  width:28px;height:28px;
  border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  flex-shrink:0;
}
.trending-rank.r1{background:linear-gradient(135deg,#e17055,#fd79a8)}
.trending-rank.r2{background:linear-gradient(135deg,#fdcb6e,#e17055)}
.trending-rank.r3{background:linear-gradient(135deg,#0984e3,#6c5ce7)}
.trending-rank.r4,.trending-rank.r5,.trending-rank.r6{background:var(--bg-elevated);color:var(--text-tertiary)}
.trending-info{flex:1;min-width:0}
.trending-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:2px}
.trending-heat{font-size:11px;color:var(--text-tertiary)}

/* ========== Responsive ========== */
@media(min-width:428px){
  .app-content{padding:16px 20px}
  .news-card{border-radius:var(--radius-xl)}
  .detail-scroll{padding:16px 28px calc(28px + var(--safe-bottom))}
}

/* ========== Animations ========== */
@media(prefers-reduced-motion:reduce){

// ========== APP STATE ==========
const state = {
  theme: localStorage.getItem('ai-feed-theme') || 'dark',
  bookmarks: JSON.parse(localStorage.getItem('ai-feed-bookmarks') || '[]'),
  userTags: JSON.parse(localStorage.getItem('ai-feed-tags') || '["大模型","AI Agent","具身智能","多模态"]'),
  activeCategory: 'all',
  activePage: 'main',
  searchQuery: '',
  currentNewsId: null,
  visibleCards: new Set()
};

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  setTheme(state.theme);
  setDate();
  renderTrending();
  renderNews();
  renderFavorites();
  renderTags();
  bindEvents();
  initLazyObserver();
  initScrollTop();
});

// ========== DATE ==========
function setDate() {
  const now = new Date();
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('todayDate').textContent = now.toLocaleDateString('zh-CN', opts);
}

// ========== THEME ==========
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  state.theme = theme;
  localStorage.setItem('ai-feed-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (theme === 'light') {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    icon.style.fill = 'none';
    icon.style.stroke = 'currentColor';
    icon.style.strokeWidth = '2';
    icon.style.strokeLinecap = 'round';
  } else {
    icon.innerHTML = '<path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>';
    icon.style.fill = 'currentColor';
    icon.style.stroke = 'none';
  }
}

// ========== RENDER TRENDING ==========
function renderTrending() {
  const container = document.getElementById('trendingList');
  const hotNews = newsData.filter(n => n.hot).sort((a, b) => parseFloat(b.views) - parseFloat(a.views)).slice(0, 5);
  container.innerHTML = hotNews.map((n, i) => `
    <div class="trending-card" onclick="openDetail(${n.id})" role="button" tabindex="0">
      <div class="trending-rank r${i + 1}">${i + 1}</div>
      <div class="trending-info">
        <div class="trending-title">${n.title}</div>
        <div class="trending-heat">${n.emoji} ${n.views} 阅读</div>
      </div>
      ${n.hot ? '<span class="hot-badge">HOT</span>' : ''}
    </div>
  `).join('');
}

// ========== RENDER NEWS ==========
function renderNews() {
  const container = document.getElementById('newsList');
  let filtered = newsData;

  if (state.activeCategory !== 'all') {
    filtered = filtered.filter(n => n.category === state.activeCategory);
  }

  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    filtered = filtered.filter(n =>
      n.title.toLowerCase().includes(q) ||
      n.summary.toLowerCase().includes(q) ||
      n.tag.toLowerCase().includes(q)
    );
  }

  document.getElementById('newsCount').textContent = `${filtered.length} 条`;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>未找到相关新闻<br>试试其他关键词或分类</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((n, i) => {
    const isBookmarked = state.bookmarks.includes(n.id);
    const catClass = n.category === 'ai' ? '' : `cat-${n.category}`;
    return `
    <article class="news-card" data-id="${n.id}" data-index="${i}" style="animation-delay:${Math.min(i * 0.06, 0.5)}s" role="article">
      <div class="card-gradient-bar ${catClass}"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-tag tag-${n.category}">${n.tag}</span>
          <span class="card-source">${n.source}</span>
          ${n.hot ? '<span class="hot-badge">HOT</span>' : ''}
          <span class="card-time">${n.time}</span>
        </div>
        <h2 class="card-title" onclick="openDetail(${n.id})">${n.title}</h2>
        <p class="card-summary" onclick="openDetail(${n.id})">${n.summary}</p>
        <div class="card-image-wrapper" data-news-id="${n.id}">
          <div class="card-image-placeholder" data-lazy="${n.id}">${n.emoji}</div>
        </div>
        <div class="card-footer">
          <div class="card-stats">
            <span class="card-stat"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/></svg>${n.views}</span>
            <span class="card-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${n.comments}</span>
          </div>
          <button class="card-bookmark ${isBookmarked ? 'bookmarked' : ''}" onclick="toggleBookmark(${n.id}, event)" aria-label="${isBookmarked ? '取消收藏' : '收藏'}">
            <svg viewBox="0 0 24 24">${isBookmarked
              ? '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="currentColor"/>'
              : '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2"/>'}</svg>
          </button>
        </div>
      </div>
    </article>`;
  }).join('');
}

// ========== BOOKMARK ==========
function toggleBookmark(id, e) {
  e.stopPropagation();
  const idx = state.bookmarks.indexOf(id);
  if (idx > -1) {
    state.bookmarks.splice(idx, 1);
    showToast('已取消收藏');
  } else {
    state.bookmarks.push(id);
    showToast('已收藏');
  }
  localStorage.setItem('ai-feed-bookmarks', JSON.stringify(state.bookmarks));
  renderNews();
  renderFavorites();
}

// ========== FAVORITES ==========
function renderFavorites() {
  const container = document.getElementById('favNewsList');
  const favNews = newsData.filter(n => state.bookmarks.includes(n.id));

  if (favNews.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💾</div>
        <p>暂无收藏新闻<br>点击新闻卡片的书签图标即可收藏</p>
      </div>`;
  } else {
    container.innerHTML = favNews.map(n => `
      <div class="trending-card" onclick="openDetail(${n.id})" role="button" tabindex="0" style="padding:14px 16px;margin-bottom:10px">
        <div style="font-size:28px;flex-shrink:0">${n.emoji}</div>
        <div class="trending-info">
          <div class="trending-title">${n.title}</div>
          <div class="trending-heat">${n.tag} · ${n.time}</div>
        </div>
      </div>
    `).join('');
  }
}

// ========== TAGS ==========
function renderTags() {
  const container = document.getElementById('tagsCloud');
  container.innerHTML = state.userTags.map((tag, i) => `
    <span class="user-tag">
      <span class="tag-color-${i % 6}" style="width:8px;height:8px;border-radius:50%;display:inline-block"></span>
      ${tag}
      <button class="remove-tag" onclick="removeTag(${i})">&times;</button>
    </span>
  `).join('');
}

function removeTag(index) {
  state.userTags.splice(index, 1);
  localStorage.setItem('ai-feed-tags', JSON.stringify(state.userTags));
  renderTags();
  showToast('标签已删除');
}

// ========== DETAIL PANEL ==========
function openDetail(id) {
  const news = newsData.find(n => n.id === id);
  if (!news) return;
  state.currentNewsId = id;

  const related = newsData.filter(n => n.id !== id && (n.category === news.category || n.tag === news.tag)).slice(0, 4);
  const isBookmarked = state.bookmarks.includes(id);

  const scroll = document.getElementById('detailScroll');
  scroll.innerHTML = `
    <div class="detail-tag-row">
      <span class="card-tag tag-${news.category}">${news.tag}</span>
      ${news.hot ? '<span class="hot-badge">HOT</span>' : ''}
    </div>
    <h1 class="detail-title">${news.title}</h1>
    <div class="detail-meta-row">
      <span>${news.emoji} ${news.source}</span>
      <span>${news.time}</span>
      <span>${news.views} 阅读</span>
      <span>${news.comments} 评论</span>
    </div>
    <div class="detail-image">${news.emoji}</div>
    <div class="detail-content">
      <p>${news.summary}</p>
      <p>在AI技术持续加速迭代的背景下，这一事件/技术/产品引发了业界广泛关注。以下从多个维度进行深度分析：</p>
    </div>
    <div class="detail-analysis">
      <h3>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        深度分析
      </h3>
      ${news.analysis.split('\n\n').map(p => `<p>${p}</p>`).join('')}
    </div>
    <div class="detail-actions">
      <button class="detail-action-btn primary" onclick="toggleBookmarkDetail(${id})">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        ${isBookmarked ? '已收藏' : '收藏'}
      </button>
      <button class="detail-action-btn" onclick="shareNews(${id})">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        分享
      </button>
    </div>
    <div class="related-section">
      <div class="section-header">
        <div class="section-title"><span class="dot"></span>相关推荐</div>
      </div>
      ${related.map(r => `
        <div class="related-card" onclick="openDetail(${r.id})" role="button" tabindex="0">
          <div class="related-thumb">${r.emoji}</div>
          <div class="related-info">
            <div class="related-title">${r.title}</div>
            <div class="related-meta">${r.tag} · ${r.time}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  scroll.scrollTop = 0;
  document.getElementById('detailOverlay').classList.add('active');
  document.getElementById('detailPanel').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  document.getElementById('detailPanel').classList.remove('active');
  document.body.style.overflow = '';
  state.currentNewsId = null;
}

function toggleBookmarkDetail(id) {
  toggleBookmark(id, { stopPropagation: () => {} });
  openDetail(id); // re-render
}

function shareNews(id) {
  const news = newsData.find(n => n.id === id);
  if (navigator.share) {
    navigator.share({ title: news.title, text: news.summary });
  } else {
    navigator.clipboard.writeText(news.title + ' - ' + news.summary).then(() => {
      showToast('已复制到剪贴板');
    });
  }
}

// ========== EVENTS ==========
function bindEvents() {
  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', () => {
    setTheme(state.theme === 'dark' ? 'light' : 'dark');
  });

  // Category tabs
  document.getElementById('categoryTabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.category-tab');
    if (!tab) return;
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeCategory = tab.dataset.cat;
    renderNews();
  });

  // Search
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.searchQuery = searchInput.value.trim();
      searchClear.classList.toggle('visible', !!state.searchQuery);
      renderNews();
    }, 250);
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    state.searchQuery = '';
    searchClear.classList.remove('visible');
    renderNews();
    searchInput.focus();
  });

  // Detail close
  document.getElementById('detailOverlay').addEventListener('click', closeDetail);

  // Panel swipe down to close
  let startY = 0;
  const panel = document.getElementById('detailPanel');
  panel.addEventListener('touchstart', (e) => {
    const scroll = document.getElementById('detailScroll');
    if (scroll.scrollTop <= 0) {
      startY = e.touches[0].clientY;
    }
  }, { passive: true });
  panel.addEventListener('touchmove', (e) => {
    if (startY > 0 && e.touches[0].clientY - startY > 80) {
      closeDetail();
      startY = 0;
    }
  }, { passive: true });

  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      switchPage(page);
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
    });
  });

  // Fav back
  document.getElementById('favBackBtn').addEventListener('click', () => {
    switchPage('main');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector('.nav-item[data-page="main"]').classList.add('active');
  });

  // Add tag
  document.getElementById('addTagBtn').addEventListener('click', addTag);
  document.getElementById('newTagInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addTag();
  });
}

function addTag() {
  const input = document.getElementById('newTagInput');
  const val = input.value.trim();
  if (!val) return;
  if (state.userTags.includes(val)) {
    showToast('标签已存在');
    return;
  }
  if (state.userTags.length >= 20) {
    showToast('最多添加20个标签');
    return;
  }
  state.userTags.push(val);
  localStorage.setItem('ai-feed-tags', JSON.stringify(state.userTags));
  renderTags();
  input.value = '';
  showToast('标签已添加');
}

function switchPage(page) {
  state.activePage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (page === 'main') {
    document.getElementById('mainPage').classList.add('active');
  } else if (page === 'fav') {
    document.getElementById('favPage').classList.add('active');
    renderFavorites();
    renderTags();
  } else if (page === 'discover') {
    // Switch to main with all category
    document.getElementById('mainPage').classList.add('active');
    state.activeCategory = 'all';
    state.searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').classList.remove('visible');
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.category-tab[data-cat="all"]').classList.add('active');
    renderNews();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== TOAST ==========
function showToast(msg) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.textContent = msg;
  toast.style.cssText = `
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
    background:var(--bg-elevated);color:var(--text-primary);
    padding:10px 24px;border-radius:var(--radius-full);
    font-size:14px;font-weight:500;
    box-shadow:var(--shadow-lg);
    z-index:999;opacity:0;
    transition:all 0.3s ease;
    border:1px solid var(--border-color-strong);
  `;
  document.body.appendChild(toast);
  requestAnimationFrame(() => {
    toast.style.opacity = '1';
    toast.style.transform = 'translate(-50%,-50%) scale(1)';
  });
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translate(-50%,-50%) scale(0.8)';
    setTimeout(() => toast.remove(), 300);
  }, 1500);
}

// ========== LAZY LOADING (IntersectionObserver) ==========
function initLazyObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        observer.unobserve(entry.target);
      }
    });
  }, { rootMargin: '50px', threshold: 0.1 });

  function observeCards() {
    document.querySelectorAll('.news-card').forEach(card => {
      observer.observe(card);
    });
  }
  observeCards();
  // Re-observe on render
  const origRender = renderNews;
  renderNews = function () {
    origRender.call(this);
    setTimeout(observeCards, 50);
  };
}

// ========== SCROLL TO TOP ==========
function initScrollTop() {
  const btn = document.getElementById('scrollTopBtn');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 600);
  }, { passive: true });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

// ========== VIRTUAL SCROLL SIMULATION ==========
// Only render cards that are near the viewport
(function simulateVirtualScroll() {
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const cards = document.querySelectorAll('.news-card');
        const viewH = window.innerHeight;
        cards.forEach(card => {
          const rect = card.getBoundingClientRect();
          if (rect.top < viewH + 200 && rect.bottom > -200) {
            card.style.opacity = '';
            card.style.transform = '';
          }
        });
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();
</script>
